{% extends "base.html" %}
{% load tailwind_filters %}

{% block content %}

<div class="max-w-lg mx-auto">
    <!-- <a href="/leads">Go back to leads</a> -->
    <a class="hover:text-blue-500" href="{% url 'agents:agent-list' %}">Go back to agents</a>
    <div class="py-5 border-t border-gray-200">
        <h1 class="text-4xl text-gray-800">Create a new Agent</h1>
    </div>

    <form method="post">
        {% csrf_token %}
          {% comment %}
          {{ form.as_p }}
          {% endcomment %}

          {{ form|crispy }}
        <button class="w-full bg-blue-500 hover:bg-blue-600 px-3 py-2 rounded-lg text-white" type="submit">Submit</button>
    </form>
</div>
{% endblock content %}

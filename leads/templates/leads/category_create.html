{% extends "base.html" %}
{% load tailwind_filters %}

{% block content %}

<div class="max-w-lg mx-auto">
    <!-- <a href="/leads">Go back to leads</a> -->
    <a class="hover:text-blue-500" href="{% url 'leads:lead-list' %}">Go back to category list</a>
    <div class="py-5 border-t border-gray-200">
        <h1 class="text-4xl text-gray-800">Create a new category</h1>
    </div>
    <form method="post" class="mt-5">
        {% csrf_token %}
        {% comment %}
        {{ form.as_p }}
        {% endcomment %}

        {{ form|crispy }}
        <button class="w-full bg-blue-500 hover:bg-blue-600 px-3 py-2 rounded-lg text-white"
            type="submit">Submit</button>
    </form>
</div>
{% endblock content %}

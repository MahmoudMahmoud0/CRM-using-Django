{% extends 'base.html' %}
{% load tailwind_filters %}

{% block content %}


<div class="max-w-lg mx-auto">
    <h1 class="text-4xl">Reset the password</h1>

    <form method="post" class="mt-5">

        {% csrf_token %}

        {% comment %}
        {{ form.as_p }}
        {% endcomment %}

        {{ form|crispy }}
        <button class="w-full bg-blue-500 hover:bg-blue-600 px-3 py-2 rounded-lg text-white" type="submit">Reset
            Password</button>
        <div class="mt-5 py-5 border-t border-gray-200">
            <a class="hover:text-blue-500 mt-3" href="{% url 'login' %}">Already have an account?</a>
        </div>
    </form>
</div>


{% endblock content %}
